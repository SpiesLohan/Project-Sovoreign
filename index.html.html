<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOVEREIGN // Ascension Protocol</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#070710">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOVEREIGN">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg:#070710; --bg2:#0d0d1a; --bg3:#12122a;
    --panel:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.07);
    --accent:#c8a96e; --accent2:#7b5ea7; --text:#e8e0d0; --muted:#6b6a7a;
    --rank-f:#555555; --rank-d:#7a4f2a; --rank-c:#2e6b3e; --rank-b:#1a5f8a; --rank-a:#6a2ea0; --rank-s:#c8a92e; --rank-ss:#e07830; --rank-sss:#cc2040;
    --glow-s:0 0 20px rgba(200,169,46,0.6); --glow-sss:0 0 25px rgba(204,32,64,0.8);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(123,94,167,0.08) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px 80px;}

  header{text-align:center;padding:48px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px;}
  h1{font-family:'Cinzel Decorative',serif;font-size:clamp(28px,5vw,52px);font-weight:900;background:linear-gradient(135deg,#e8d9b0 0%,#c8a96e 40%,#8b6d3a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px; cursor: pointer;}
  
  .xp-container {max-width: 400px; margin: 20px auto 0; text-align: center;}
  .xp-bar-bg {height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden;}
  .xp-bar-fill {height:100%; background:linear-gradient(90deg, var(--accent2), var(--accent)); transition:width 0.5s ease-out;}

  .tabs{display:flex;gap:4px;margin-bottom:32px;background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:4px;overflow-x:auto;}
  .tab{flex:1;padding:10px 4px;background:none;border:1px solid transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:10px;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
  .tab.active{background:rgba(200,169,110,0.1);color:var(--accent);border:1px solid rgba(200,169,110,0.2);}
  .view{display:none;} .view.active{display:block;}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:24px;margin-bottom:20px;}
  .panel-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;gap:12px;}
  .panel-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* LOGGING UI */
  .set-row {display: grid; grid-template-columns: 1fr 1fr 40px; gap: 10px; margin-bottom: 10px; align-items: center;}
  .one-rm-display {background: rgba(200,169,110,0.1); padding: 15px; border-radius: 2px; text-align: center; margin: 15px 0; border: 1px dashed var(--accent);}
  
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:16px;}
  input,select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:2px;color:var(--text);padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:15px;}

  .btn{padding:11px 28px;background:none;border:1px solid var(--accent);color:var(--accent);font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;}
  .btn-danger{border-color:#cc3344;color:#cc3344;}
  .btn-full{width:100%;margin-top:16px;}
  .btn-small { padding: 6px 0; font-size: 9px; width: 100%; text-align: center; }

  .exercise-card{
    background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:2px; padding:14px 18px;
    display:grid; grid-template-columns: 1fr 20%; gap:16px; align-items:center; margin-bottom: 12px;
  }
  .log-entry{
    display:grid; grid-template-columns: auto 1fr auto auto; align-items:center; gap:14px; padding:10px 14px;
    background:rgba(255,255,255,0.02); border:1px solid var(--border); margin-bottom:8px; font-size:14px;
    border-left: 3px solid transparent;
  }

  .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;font-family:'Cinzel Decorative',serif;font-weight:900;font-size:12px;border-radius:2px;border:2px solid;flex-shrink:0;}
  
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:#0d0d1a;border:1px solid var(--accent);padding:32px;width:100%;max-width:440px;margin:20px;max-height:90vh;overflow-y:auto;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-subtitle">// Ascension Protocol //</div>
    <h1 onclick="playSound('powerUp')">SOVEREIGN</h1>
    <div class="xp-container">
      <div class="level-text" id="header-level">Level 1 Novice</div>
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="header-xp-fill" style="width: 0%;"></div></div>
      <div class="xp-text" id="header-xp-text">0 / 100 XP</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('exercises',this)">Arsenal</button>
    <button class="tab" onclick="switchTab('log',this)">Log</button>
    <button class="tab" onclick="switchTab('character',this)">Character</button>
    <button class="tab" onclick="switchTab('achievements',this)">Feats</button>
  </div>

  <div class="view active" id="view-exercises">
    <div class="panel">
      <div class="panel-title">Add Exercise</div>
      <div class="form-grid">
        <input type="text" id="ex-name" placeholder="Name">
        <select id="ex-unit" onchange="updateExInputUI()">
            <option value="kg">Weighted (kg)</option>
            <option value="reps">Bodyweight (Reps)</option>
            <option value="minutes">Time (M:S)</option>
        </select>
        <div id="ex-best-standard-wrap"><input type="number" id="ex-best" placeholder="SSS 1RM/Benchmark"></div>
        <div id="ex-best-time-wrap" style="display:none; gap:8px; display:flex;">
          <input type="number" id="ex-best-min" placeholder="Min" style="flex:1;"><input type="number" id="ex-best-sec" placeholder="Sec" style="flex:1;">
        </div>
        <select id="ex-body"><option value="upper">Upper</option><option value="lower">Lower</option><option value="core">Core</option><option value="cardio">Cardio</option></select>
        <select id="ex-type"><option value="strength">Strength</option><option value="speed">Speed</option></select>
      </div>
      <button class="btn btn-full" onclick="addExercise()">Add Exercise</button>
    </div>
    <div id="exercise-list"></div>
  </div>

  <div class="view" id="view-log">
    <div class="panel">
      <div class="panel-title">Capture Session</div>
      <select id="log-exercise" onchange="setupLogUI()"></select>
      
      <div id="strength-log-ui" style="display:none; margin-top:20px;">
        <div id="set-container"></div>
        <button class="btn" style="padding: 5px 15px; font-size: 10px;" onclick="addSetRow()">+ Add Set</button>
        <div class="one-rm-display">
          <div style="font-size:10px; color:var(--muted); letter-spacing:2px;">ESTIMATED 1RM</div>
          <div id="est-1rm-val" style="font-size:24px; font-weight:900; color:var(--accent);">0.00 kg</div>
        </div>
      </div>

      <div id="standard-log-ui" style="margin-top:20px;">
        <div class="form-grid">
           <div id="log-amount-standard-wrap"><input type="number" id="log-amount" placeholder="Performance Result"></div>
           <div id="log-amount-time-wrap" style="display:none; gap:8px; display:flex;">
             <input type="number" id="log-amount-min" placeholder="Min"><input type="number" id="log-amount-sec" placeholder="Sec">
           </div>
        </div>
      </div>

      <input type="date" id="log-date" style="margin-top:15px;">
      <button class="btn btn-full" onclick="submitLog()">Finalize Capture</button>
    </div>
    <div id="log-history"></div>
  </div>

  <div class="view" id="view-character">
    <div class="panel">
        <div class="panel-title">Athletic Pentagram</div>
        <div style="width: 100%; max-width: 400px; margin: 0 auto;"><canvas id="radarChart"></canvas></div>
    </div>
    <div id="char-stats"></div>
    <button class="btn btn-full" onclick="exportData()">Backup System</button>
  </div>

  <div class="view" id="view-achievements">
    <div id="achievements-grid" class="achievements-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-title">Ascension Logged</div>
    <div style="display:flex; align-items:center; gap:15px; margin:20px 0;">
        <div class="rank-badge" id="modal-rank"></div>
        <div>
          <div id="modal-pct" style="font-weight:700; font-size:18px;"></div>
          <div id="modal-val-detail" style="font-size:12px; color:var(--muted);"></div>
        </div>
    </div>
    <button class="btn btn-full" onclick="closeModal()">Continue</button>
  </div>
</div>

<script>
// --- AUDIO ---
const aCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(t){
    const o=aCtx.createOscillator(), g=aCtx.createGain(); o.connect(g); g.connect(aCtx.destination);
    const n=aCtx.currentTime;
    if(t==='click'){o.type='sine';o.frequency.setValueAtTime(800,n);g.gain.setValueAtTime(0.1,n);g.gain.linearRampToValueAtTime(0,n+0.1);}
    else if(t==='powerUp'){o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.linearRampToValueAtTime(800,n+0.5);g.gain.setValueAtTime(0.05,n);g.gain.linearRampToValueAtTime(0,n+0.5);}
    o.start(); o.stop(n+0.5);
}

// --- STATE MANAGEMENT ---
// Using v4_pro to keep your vfinal data safe.
let state = JSON.parse(localStorage.getItem('sovereign_v4_pro') || '{"exercises":[],"logs":[],"unlockedAchs":{},"xp":0,"level":1,"protocols":[]}');
function save(){ localStorage.setItem('sovereign_v4_pro', JSON.stringify(state)); }

const RC={F:'#555',D:'#7a4f2a',C:'#2e6b3e',B:'#1a5f8a',A:'#6a2ea0',S:'#c8a92e',SS:'#e07830',SSS:'#cc2040'};

// --- 1RM CALCULATOR (Brzycki) ---
function calc1RM(w, r) {
    if (r <= 1) return w;
    return w * (36 / (37 - r));
}

// --- UI LOGIC ---
function updateExInputUI(){
    const unit = document.getElementById('ex-unit').value;
    document.getElementById('ex-best-standard-wrap').style.display = unit === 'minutes' ? 'none' : 'block';
    document.getElementById('ex-best-time-wrap').style.display = unit === 'minutes' ? 'flex' : 'none';
}

function setupLogUI() {
    const ex = state.exercises.find(e => e.id == document.getElementById('log-exercise').value);
    const strengthUI = document.getElementById('strength-log-ui');
    const standardUI = document.getElementById('standard-log-ui');
    const timeWrap = document.getElementById('log-amount-time-wrap');
    const standardWrap = document.getElementById('log-amount-standard-wrap');

    if (ex && ex.unit === 'kg') {
        strengthUI.style.display = 'block';
        standardUI.style.display = 'none';
        if (document.getElementById('set-container').children.length === 0) addSetRow();
    } else {
        strengthUI.style.display = 'none';
        standardUI.style.display = 'block';
        timeWrap.style.display = ex && ex.unit === 'minutes' ? 'flex' : 'none';
        standardWrap.style.display = ex && ex.unit === 'minutes' ? 'none' : 'block';
    }
}

function addSetRow() {
    const container = document.getElementById('set-container');
    const row = document.createElement('div');
    row.className = 'set-row';
    row.innerHTML = `
        <input type="number" class="set-w" placeholder="kg" oninput="updateLive1RM()">
        <input type="number" class="set-r" placeholder="reps" oninput="updateLive1RM()">
        <button class="btn btn-danger btn-small" onclick="this.parentElement.remove(); updateLive1RM();">✖</button>
    `;
    container.appendChild(row);
}

function updateLive1RM() {
    let max = 0;
    document.querySelectorAll('.set-row').forEach(row => {
        const w = parseFloat(row.querySelector('.set-w').value) || 0;
        const r = parseFloat(row.querySelector('.set-r').value) || 0;
        max = Math.max(max, calc1RM(w, r));
    });
    document.getElementById('est-1rm-val').textContent = max.toFixed(2) + " kg";
    return max;
}

// --- CORE LOGIC ---
function addExercise(){
    const u = document.getElementById('ex-unit').value;
    let b;
    if(u==='minutes') b = (parseFloat(document.getElementById('ex-best-min').value)||0)+(parseFloat(document.getElementById('ex-best-sec').value)||0)/60;
    else b = parseFloat(document.getElementById('ex-best').value);
    
    state.exercises.push({
        id: Date.now(),
        name: document.getElementById('ex-name').value,
        unit: u,
        best: b,
        body: document.getElementById('ex-body').value,
        type: document.getElementById('ex-type').value,
        pb: null
    });
    save(); location.reload();
}

function submitLog() {
    const ex = state.exercises.find(e => e.id == document.getElementById('log-exercise').value);
    let val;
    if (ex.unit === 'kg') {
        val = updateLive1RM();
    } else if (ex.unit === 'minutes') {
        val = (parseFloat(document.getElementById('log-amount-min').value)||0)+(parseFloat(document.getElementById('log-amount-sec').value)||0)/60;
    } else {
        val = parseFloat(document.getElementById('log-amount').value);
    }

    if (!ex || isNaN(val)) return alert("Invalid entry");

    const isPB = ex.pb === null || val > ex.pb;
    if (isPB) { ex.pb = val; playSound('powerUp'); }
    
    state.logs.push({id: Date.now(), exId: ex.id, val: val, ts: new Date(document.getElementById('log-date').value).getTime()});
    state.xp += 50;
    save();
    showModal(ex, val, isPB);
}

function showModal(ex, v, isPB) {
    const p = Math.round((v / ex.best) * 100);
    const r = p >= 100 ? 'SSS' : p >= 85 ? 'SS' : p >= 70 ? 'S' : p >= 55 ? 'A' : p >= 40 ? 'B' : p >= 25 ? 'C' : p >= 10 ? 'D' : 'F';
    document.getElementById('modal-rank').textContent = r;
    document.getElementById('modal-rank').className = `rank-badge rank-${r}`;
    document.getElementById('modal-pct').textContent = `${p}% Ascension`;
    document.getElementById('modal-val-detail').textContent = ex.unit === 'kg' ? `Calculated 1RM: ${v.toFixed(2)}kg` : `Performance: ${v}`;
    document.getElementById('result-modal').classList.add('open');
}

// --- SYSTEM ---
function switchTab(n,e){
    playSound('click');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById('view-'+n).classList.add('active');
    e.classList.add('active');
    if(n==='log') renderLogView();
}
function renderLogView(){
    document.getElementById('log-exercise').innerHTML='<option value="">-Select-</option>'+state.exercises.map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
}
function closeModal() { document.getElementById('result-modal').classList.remove('open'); }
function exportData(){ let b=new Blob([JSON.stringify(state)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='sovereign_v4.json'; a.click();}

// INIT
document.getElementById('log-date').value=new Date().toISOString().split('T')[0];
save();
</script>
</body>
</html>
