<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOVEREIGN // Ascension Protocol</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#070710">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOVEREIGN">
<link rel="apple-touch-icon" href="icon-192.png">

<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
  :root {
    --bg:#070710; --bg2:#0d0d1a; --bg3:#12122a;
    --panel:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.07);
    --accent:#c8a96e; --accent2:#7b5ea7; --text:#e8e0d0; --muted:#6b6a7a;
    --rank-f:#555; --rank-d:#7a4f2a; --rank-c:#2e6b3e; --rank-b:#1a5f8a;
    --rank-a:#6a2ea0; --rank-s:#c8a92e; --rank-ss:#e07830; --rank-sss:#cc2040;
    --glow-s:0 0 20px rgba(200,169,46,0.6);
    --glow-sss:0 0 25px rgba(204,32,64,0.8);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 0%,rgba(123,94,167,0.08) 0%,transparent 70%),radial-gradient(ellipse 50% 30% at 80% 100%,rgba(200,169,110,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 20px 80px;}

  header{text-align:center;padding:48px 0 32px;border-bottom:1px solid var(--border);margin-bottom:40px;}
  .logo-subtitle{font-family:'Cinzel',serif;font-size:11px;letter-spacing:8px;color:var(--accent);text-transform:uppercase;margin-bottom:12px;}
  h1{font-family:'Cinzel Decorative',serif;font-size:clamp(28px,5vw,52px);font-weight:900;background:linear-gradient(135deg,#e8d9b0 0%,#c8a96e 40%,#8b6d3a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px; cursor: pointer;}
  
  .xp-container {max-width: 400px; margin: 20px auto 0; text-align: center;}
  .level-text {font-family:'Cinzel',serif; font-size:12px; letter-spacing:2px; color:var(--accent); margin-bottom:6px; text-transform:uppercase;}
  .xp-bar-bg {height:4px; background:rgba(255,255,255,0.05); border-radius:2px; overflow:hidden;}
  .xp-bar-fill {height:100%; background:linear-gradient(90deg, var(--accent2), var(--accent)); transition:width 0.5s ease-out;}
  .xp-text {font-size:10px; color:var(--muted); margin-top:6px; letter-spacing:1px;}

  .tabs{display:flex;gap:4px;margin-bottom:32px;background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:4px;overflow-x:auto;}
  .tab{flex:1;padding:10px 4px;background:none;border:1px solid transparent;color:var(--muted);font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;}
  .tab.active{background:rgba(200,169,110,0.1);color:var(--accent);border:1px solid rgba(200,169,110,0.2);}
  .view{display:none;} .view.active{display:block;}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:2px;padding:24px;margin-bottom:20px;}
  .panel-title{font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;gap:12px;}
  .panel-title::after{content:'';flex:1;height:1px;background:var(--border);}

  .boss-panel {border-color: rgba(204,32,64,0.4); background: radial-gradient(circle at top right, rgba(204,32,64,0.05), transparent);}
  .boss-title {color: var(--rank-sss); text-shadow: var(--glow-sss);}
  .boss-target {font-size: 24px; font-weight: 700; color: #fff;}

  .shadow-wrap {margin-top: 10px; padding: 12px; background: rgba(255,255,255,0.02); border: 1px dashed var(--muted); border-radius: 2px; display: none;}
  .shadow-wrap.active {display: flex; justify-content: space-between; align-items: center;}
  
  .timer-wrap {margin-top: 16px; text-align: center; display: none;}
  .timer-display {font-family:'Cinzel Decorative',serif; font-size: 32px; font-weight: 900; color: var(--accent); margin: 10px 0;}

  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:16px;}
  label{display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;font-family:'Cinzel',serif;}
  input,select{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:2px;color:var(--text);padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;}

  .btn{padding:11px 28px;background:none;border:1px solid var(--accent);color:var(--accent);font-family:'Cinzel',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;}
  .btn-danger{border-color:#cc3344;color:#cc3344;}
  .btn-full{width:100%;margin-top:16px;}
  .btn-small { padding: 6px 0; font-size: 9px; width: 100%; text-align: center; }

  /* EXERCISE LAYOUT 15/85 */
  .exercise-list{display:flex;flex-direction:column;gap:12px;}
  .exercise-card{
    background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:2px; padding:14px 18px;
    display:grid; grid-template-columns: 1fr 20%; gap:16px; align-items:center;
  }
  .exercise-info h3{ font-family:'Cinzel',serif; font-size:13px; text-transform:uppercase; white-space: normal; word-break: break-word; }
  .exercise-actions{ display:flex; flex-direction:column; gap:6px; align-items: flex-end; }
  .history-link { font-size: 9px; color: var(--accent); text-decoration: underline; cursor: pointer; margin-top: 4px; display: inline-block;}

  .log-entry{
    display:grid; grid-template-columns: auto 1fr auto auto; align-items:center; gap:14px; padding:10px 14px;
    background:rgba(255,255,255,0.02); border:1px solid var(--border); margin-bottom:8px; font-size:14px;
  }

  .rank-badge{display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;font-family:'Cinzel Decorative',serif;font-weight:900;font-size:12px;border-radius:2px;border:2px solid;}
  .rank-SSS{box-shadow:var(--glow-sss); animation: pulse-sss 2s infinite;}
  @keyframes pulse-sss { 0%,100% {opacity:1;} 50% {opacity:0.7;} }

  .radar-wrap { width: 100%; max-width: 400px; margin: 0 auto; }
  .achievements-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
  .achievement{ background:rgba(255,255,255,0.02); border:1px solid var(--border); padding:18px; display:flex; gap:16px; cursor: pointer;}
  .achievement.unlocked{border-color:var(--accent); background:rgba(200,169,110,0.05);}
  .achievement.locked{opacity:0.4; filter:grayscale(1);}

  .protocol-card { border: 1px solid var(--accent2); background: rgba(123, 94, 167, 0.05); padding: 15px; margin-bottom: 10px; cursor: pointer; }

  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s;}
  .modal-overlay.open{opacity:1;pointer-events:all;}
  .modal{background:#0d0d1a;border:1px solid var(--accent);padding:32px;width:100%;max-width:440px;margin:20px;max-height:90vh;overflow-y:auto;}
  .chart-container { height: 250px; width: 100%; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-subtitle">// Ascension Protocol //</div>
    <h1 onclick="playSound('powerUp')">SOVEREIGN</h1>
    <div class="xp-container">
      <div class="level-text" id="header-level">Level 1 Novice</div>
      <div class="xp-bar-bg"><div class="xp-bar-fill" id="header-xp-fill" style="width: 0%;"></div></div>
      <div class="xp-text" id="header-xp-text">0 / 100 XP</div>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('exercises',this)">Arsenal</button>
    <button class="tab" onclick="switchTab('protocols',this)">Protocols</button>
    <button class="tab" onclick="switchTab('log',this)">Log</button>
    <button class="tab" onclick="switchTab('character',this)">Character</button>
    <button class="tab" onclick="switchTab('achievements',this)">Feats</button>
  </div>

  <div class="view active" id="view-exercises">
    <div class="panel boss-panel" id="boss-container" style="display: none;">
      <div class="panel-title boss-title">⚠️ Active Boss Target</div>
      <div id="boss-details"></div>
    </div>
    <div class="panel">
      <div class="panel-title">Add Exercise</div>
      <div class="form-grid">
        <input type="text" id="ex-name" placeholder="Exercise Name">
        <select id="ex-unit" onchange="updateExInputUI()">
            <option value="reps">Reps</option><option value="kg">kg</option><option value="minutes">Time (M:S)</option>
        </select>
        <div id="ex-best-standard-wrap"><input type="number" id="ex-best" placeholder="Benchmark"></div>
        <div id="ex-best-time-wrap" style="display:none; gap:8px; display:flex;">
          <input type="number" id="ex-best-min" placeholder="Min" style="flex:1;"><input type="number" id="ex-best-sec" placeholder="Sec" style="flex:1;">
        </div>
        <select id="ex-direction"><option value="higher">Higher Better</option><option value="lower">Lower Better</option></select>
        <select id="ex-body"><option value="upper">Upper</option><option value="lower">Lower</option><option value="core">Core</option><option value="cardio">Cardio</option></select>
        <select id="ex-type"><option value="strength">Strength</option><option value="speed">Speed</option></select>
      </div>
      <button class="btn btn-full" id="btn-submit-ex" onclick="addExercise()">Add to Arsenal</button>
    </div>
    <div id="exercise-list" class="exercise-list"></div>
  </div>

  <div class="view" id="view-protocols">
    <div class="panel">
      <div class="panel-title">Create Protocol</div>
      <input type="text" id="proto-name" placeholder="e.g. Leg Day">
      <div id="proto-selector" style="margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:5px; max-height: 200px; overflow-y: auto; padding: 10px; border: 1px solid var(--border);"></div>
      <button class="btn btn-full" onclick="createProtocol()">Initialize Protocol</button>
    </div>
    <div id="protocol-list"></div>
  </div>

  <div class="view" id="view-log">
    <div class="panel">
      <div class="panel-title">Capture Performance</div>
      <div id="proto-notice" style="display:none; color:var(--accent2); font-size:10px; margin-bottom:5px;">// PROTOCOL ACTIVE //</div>
      <select id="log-exercise" onchange="updateLogInputUI()"></select>
      <div class="form-grid" style="margin-top:10px;">
        <div id="log-amount-standard-wrap"><input type="number" id="log-amount" placeholder="Result"></div>
        <div id="log-amount-time-wrap" style="display:none; gap:8px; display:flex;">
          <input type="number" id="log-amount-min" placeholder="Min"><input type="number" id="log-amount-sec" placeholder="Sec">
        </div>
        <input type="date" id="log-date">
      </div>
      <div class="shadow-wrap" id="shadow-display">
        <div style="font-size:10px; color:var(--muted)">SHADOW (PB)</div>
        <div id="shadow-val" style="font-weight:700; color:var(--accent)">—</div>
      </div>
      <button class="btn btn-full" onclick="submitLog()">Record Log</button>
    </div>
    <div id="log-history"></div>
  </div>

  <div class="view" id="view-character">
    <div class="panel">
        <div class="panel-title">Athletic Pentagram</div>
        <div class="radar-wrap"><canvas id="radarChart"></canvas></div>
    </div>
    <div class="panel">
        <div class="panel-title">Skill Tree Path</div>
        <select id="char-path" onchange="updatePath()">
            <option value="none">Unaligned</option>
            <option value="titan">Titan (Upper/Strength focus)</option>
            <option value="wraith">Wraith (Speed focus)</option>
            <option value="paladin">Paladin (Balanced)</option>
        </select>
    </div>
    <div id="lineage-stats" style="display:flex; gap:10px; margin-bottom:20px;">
        <div class="panel" style="flex:1; text-align:center;">Golf: <span id="stat-golf" style="color:var(--accent)">—</span></div>
        <div class="panel" style="flex:1; text-align:center;">Javelin: <span id="stat-javelin" style="color:var(--accent)">—</span></div>
    </div>
    <div id="char-stats"></div>
    <button class="btn btn-full" onclick="exportData()">Export Data</button>
  </div>

  <div class="view" id="view-achievements">
    <div id="achievements-grid" class="achievements-grid"></div>
  </div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal">
    <div class="modal-title">Ascension Logged</div>
    <div id="modal-badge-wrap" style="display:flex; align-items:center; gap:15px; margin:20px 0;">
        <div class="rank-badge" id="modal-rank"></div>
        <div id="modal-pct" style="font-weight:700;"></div>
    </div>
    <div id="modal-pb-msg" style="text-align:center; color:var(--accent)"></div>
    <div id="modal-xp" style="text-align:center; color:var(--accent2); margin:10px 0;"></div>
    <div class="timer-wrap" id="timer-ui" style="display:block; text-align:center; border-top:1px solid var(--border); padding-top:20px;">
        <div class="timer-display" id="timer-clock">01:30</div>
        <button class="btn btn-small" onclick="startTimer()">Start Rest</button>
    </div>
    <button class="btn btn-full" onclick="closeModal()">Continue</button>
  </div>
</div>

<div class="modal-overlay" id="chart-modal">
    <div class="modal">
        <div class="panel-title" id="chart-title">History</div>
        <div class="chart-container"><canvas id="historyChart"></canvas></div>
        <button class="btn btn-full" onclick="document.getElementById('chart-modal').classList.remove('open')">Close</button>
    </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// --- AUDIO ---
const aCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(t){
    const o=aCtx.createOscillator(), g=aCtx.createGain(); o.connect(g); g.connect(aCtx.destination);
    const n=aCtx.currentTime;
    if(t==='click'){o.type='sine';o.frequency.setValueAtTime(800,n);o.frequency.exponentialRampToValueAtTime(100,n+0.1);g.gain.setValueAtTime(0.1,n);g.gain.linearRampToValueAtTime(0,n+0.1);}
    else if(t==='success'){o.type='triangle';o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(1200,n+0.3);g.gain.setValueAtTime(0.1,n);g.gain.linearRampToValueAtTime(0,n+0.4);}
    else if(t==='powerUp'){o.type='sawtooth';o.frequency.setValueAtTime(100,n);o.frequency.linearRampToValueAtTime(800,n+0.5);g.gain.setValueAtTime(0.05,n);g.gain.linearRampToValueAtTime(0,n+0.5);}
    o.start(); o.stop(n+0.5);
}

// --- STATE & SEED DATA ---
const SEED_EXERCISES = [
    // --- UPPER BODY: STRENGTH & POWER ---
    {name: "Pull-Ups (Vest: 20kg)", unit: "reps", benchmark: 15, body: "upper", type: "strength", direction: "higher"},
    {name: "Diamond Push-Ups (Vest: 20kg)", unit: "reps", best: 35, body: "upper", type: "strength", direction: "higher"},
    {name: "Chin-Ups (Max Reps)", unit: "reps", best: 30, body: "upper", type: "endurance", direction: "higher"},
    {name: "Floor Press (Barbell: 36kg)", unit: "reps", best: 50, body: "upper", type: "strength", direction: "higher"},
    {name: "Overhead Press (Barbell: 36kg)", unit: "reps", best: 25, body: "upper", type: "strength", direction: "higher"},
    {name: "Dumbbell Row (Dumbbell: 18kg)", unit: "reps", best: 40, body: "upper", type: "strength", direction: "higher"},
    {name: "Archer Push-Ups", unit: "reps", best: 20, body: "upper", type: "strength", direction: "higher"},
    {name: "Pseudo-Planche Push-Ups", unit: "reps", best: 15, body: "upper", type: "strength", direction: "higher"},
    {name: "Handstand Push-Ups (Against Wall)", unit: "reps", best: 12, body: "upper", type: "strength", direction: "higher"},
    {name: "Lateral Raises (Dumbbell: 18kg)", unit: "reps", best: 15, body: "upper", type: "strength", direction: "higher"},
    {name: "Resistance Band Face Pulls", unit: "reps", best: 60, body: "upper", type: "endurance", direction: "higher"},
    {name: "Bicep Curls (Barbell: 36kg)", unit: "reps", best: 20, body: "upper", type: "strength", direction: "higher"},

    // --- LOWER BODY: STRENGTH & POWER ---
    {name: "Pistol Squats (Single Leg)", unit: "reps", best: 20, body: "lower", type: "strength", direction: "higher"},
    {name: "Walking Lunges (Vest + 2x18kg DB)", unit: "reps", best: 40, body: "lower", type: "strength", direction: "higher"},
    {name: "Bulgarian Split Squat (Vest: 20kg)", unit: "reps", best: 30, body: "lower", type: "strength", direction: "higher"},
    {name: "Goblet Squat (Dumbbell: 18kg)", unit: "reps", best: 60, body: "lower", type: "endurance", direction: "higher"},
    {name: "Barbell Squat (Max Speed - 36kg)", unit: "reps", best: 50, body: "lower", type: "speed", direction: "higher"},
    {name: "Broad Jump (Standing)", unit: "minutes", best: 0.05, body: "lower", type: "speed", direction: "higher"}, // Stored as decimal (3m jump)
    {name: "Box Jumps (Max Height)", unit: "reps", best: 40, body: "lower", type: "speed", direction: "higher"},
    {name: "Glute Bridge (Barbell: 36kg)", unit: "reps", best: 100, body: "lower", type: "endurance", direction: "higher"},
    {name: "Single Leg Calf Raises (Vest: 20kg)", unit: "reps", best: 30, body: "lower", type: "strength", direction: "higher"},
    {name: "Resistance Band Leg Curls", unit: "reps", best: 50, body: "lower", type: "endurance", direction: "higher"},

    // --- CORE & STABILITY ---
    {name: "Hanging Leg Raises (Strict)", unit: "reps", best: 25, body: "core", type: "strength", direction: "higher"},
    {name: "L-Sit Hold", unit: "minutes", best: 1, body: "core", type: "strength", direction: "higher"},
    {name: "Weighted Plank (Vest: 20kg)", unit: "minutes", best: 5, body: "core", type: "endurance", direction: "higher"},
    {name: "Hollow Body Rock", unit: "reps", best: 100, body: "core", type: "endurance", direction: "higher"},
    {name: "Dragon Flag Negatives", unit: "reps", best: 10, body: "core", type: "strength", direction: "higher"},
    {name: "Russian Twists (Vest: 20kg)", unit: "reps", best: 80, body: "core", type: "endurance", direction: "higher"},
    {name: "Dead Bug (Slow Tempo)", unit: "reps", best: 50, body: "core", type: "endurance", direction: "higher"},

    // --- CARDIO & PERFORMANCE ---
    {name: "5km Run (High Altitude)", unit: "minutes", best: 19, body: "cardio", type: "endurance", direction: "lower"},
    {name: "100m Sprint (Full Power)", unit: "minutes", best: 0.19, body: "cardio", type: "speed", direction: "lower"}, // 11.5s
    {name: "Burpees (Max in 5 mins)", unit: "reps", best: 100, body: "cardio", type: "speed", direction: "higher"},
    {name: "Mountain Climbers (2 Mins)", unit: "reps", best: 250, body: "cardio", type: "speed", direction: "higher"},
    {name: "Shadow Boxing (High Intensity)", unit: "minutes", best: 15, body: "cardio", type: "endurance", direction: "higher"},
    {name: "Jump Rope (Double Unders)", unit: "reps", best: 50, body: "cardio", type: "speed", direction: "higher"},

    // --- GOLF SPECIFIC (ROTATION & EXPLOSION) ---
    {name: "Band Assisted Swing Speed", unit: "reps", best: 130, body: "core", type: "speed", direction: "higher"},
    {name: "Rotational Band Slams", unit: "reps", best: 60, body: "core", type: "speed", direction: "higher"},
    {name: "Overhead Barbell Reverse Lunge", unit: "reps", best: 20, body: "lower", type: "strength", direction: "higher"},
    {name: "Cossack Squats (Vest: 20kg)", unit: "reps", best: 24, body: "lower", type: "strength", direction: "higher"},
    {name: "Wrist Rollers (Forearm Power)", unit: "reps", best: 10, body: "upper", type: "strength", direction: "higher"},

    // --- JAVELIN LEGACY (PEAK PERFORMANCE) ---
    {name: "Overhead Vest Throw (For Distance)", unit: "reps", best: 20, body: "upper", type: "speed", direction: "higher"},
    {name: "Single Arm Band Pulls (Fast)", unit: "reps", best: 100, body: "upper", type: "speed", direction: "higher"},
    {name: "Plyometric Push-Ups", unit: "reps", best: 30, body: "upper", type: "speed", direction: "higher"},
    {name: "Tuck Jumps (Max Reps in 1m)", unit: "reps", best: 60, body: "lower", type: "speed", direction: "higher"},
    {name: "Vertical Jump (Peak Height)", unit: "minutes", best: 0.015, body: "lower", type: "speed", direction: "higher"} // ~0.9m
];

let state = JSON.parse(localStorage.getItem('sovereign_vfinal') || '{"exercises":[],"logs":[],"unlockedAchs":{},"xp":0,"level":1,"path":"none","boss":null,"protocols":[]}');

// SEED LOGIC: If no exercises exist, add the pre-loaded ones.
if (state.exercises.length === 0) {
    SEED_EXERCISES.forEach((ex, index) => {
        state.exercises.push({...ex, id: Date.now() + index, pb: null});
    });
    save();
}

function save(){ localStorage.setItem('sovereign_vfinal', JSON.stringify(state)); }

// --- HELPERS ---
function formatVal(v,u){ if(u!=='minutes') return v; let s=Math.round(v*60); return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
function getPct(ex,v){ return ex.direction==='lower' ? Math.round((ex.best/v)*100) : Math.round((v/ex.best)*100); }
function getRank(p){ if(p>=100)return'SSS';if(p>=85)return'SS';if(p>=70)return'S';if(p>=55)return'A';if(p>=40)return'B';if(p>=25)return'C';return'F';}
function rankToNum(r){return{F:0,C:1,B:2,A:3,S:4,SS:5,SSS:6}[r]??0;}
function numToRank(n){return['F','C','B','A','S','SS','SSS'][Math.min(6,Math.round(n))];}
const RC={F:'#555',C:'#2e6b3e',B:'#1a5f8a',A:'#6a2ea0',S:'#c8a92e',SS:'#e07830',SSS:'#cc2040'};

// --- XP ---
function addXP(base, ex){
    let mult=1;
    if(state.path==='titan'&&(ex.type==='strength'||ex.body==='upper')) mult=1.2;
    if(state.path==='wraith'&&(ex.type==='speed'||ex.body==='cardio')) mult=1.2;
    let gained=Math.round(base*mult); state.xp+=gained;
    let nL=Math.floor(Math.sqrt(state.xp/100))+1;
    if(nL>state.level){state.level=nL; showToast({icon:'🆙', name:`LEVEL ${state.level}`});}
    save(); renderHeader(); return gained;
}
function renderHeader(){
    document.getElementById('header-level').textContent=`Level ${state.level}`;
    let next=Math.pow(state.level,2)*100, prev=Math.pow(state.level-1,2)*100;
    document.getElementById('header-xp-fill').style.width=`${((state.xp-prev)/(next-prev))*100}%`;
    document.getElementById('header-xp-text').textContent=`${state.xp} / ${next} XP`;
}

// --- BOSS ---
function manageBoss(){
    const bEl=document.getElementById('boss-container');
    const viable=state.exercises.filter(e=>e.pb!==null);
    if(!viable.length) return;
    if(!state.boss){
        let ex=viable[Math.floor(Math.random()*viable.length)];
        state.boss={exId:ex.id, target:parseFloat((ex.direction==='lower'?ex.pb*0.95:ex.pb*1.05).toFixed(2))};
        save();
    }
    let bEx=state.exercises.find(e => e.id === state.boss.exId);
    if(bEx){
        bEl.style.display='block';
        document.getElementById('boss-details').innerHTML=`<div style="display:flex; justify-content:space-between"><div>${bEx.name}</div><div class="boss-target">${formatVal(state.boss.target,bEx.unit)}</div></div>`;
    }
}

// --- CHARTS ---
let rChart, hChart;
function renderRadar(){
    const ctx=document.getElementById('radarChart');
    const s={ Upper:0, Lower:0, Core:0, Cardio:0, Speed:0 };
    state.exercises.forEach(ex=>{
        let p=ex.pb?getPct(ex,ex.pb):0;
        if(ex.body==='upper') s.Upper=Math.max(s.Upper,p);
        if(ex.body==='lower') s.Lower=Math.max(s.Lower,p);
        if(ex.body==='core') s.Core=Math.max(s.Core,p);
        if(ex.body==='cardio') s.Cardio=Math.max(s.Cardio,p);
        if(ex.type==='speed') s.Speed=Math.max(s.Speed,p);
    });
    if(rChart) rChart.destroy();
    rChart = new Chart(ctx,{type:'radar',data:{labels:Object.keys(s),datasets:[{data:Object.values(s),backgroundColor:'rgba(200,169,110,0.2)',borderColor:'#c8a96e'}]},options:{scales:{r:{min:0,max:100,ticks:{display:false},grid:{color:'rgba(255,255,255,0.1)'}}},plugins:{legend:{display:false}}}});
}
function showHistory(id){
    const ex=state.exercises.find(e=>e.id===id), logs=state.logs.filter(l=>l.exId===id).sort((a,b)=>a.ts-b.ts);
    document.getElementById('chart-title').textContent=ex.name;
    document.getElementById('chart-modal').classList.add('open');
    if(hChart) hChart.destroy();
    hChart = new Chart(document.getElementById('historyChart'),{type:'line',data:{labels:logs.map(l=>new Date(l.ts).toLocaleDateString()),datasets:[{data:logs.map(l=>l.val),borderColor:'#c8a96e',tension:0.3}]},options:{maintainAspectRatio:false}});
}

// --- ARSENAL ---
let editId=null;
function updateExInputUI(){
    let isT=document.getElementById('ex-unit').value==='minutes';
    document.getElementById('ex-best-standard-wrap').style.display=isT?'none':'block';
    document.getElementById('ex-best-time-wrap').style.display=isT?'flex':'none';
}
function addExercise(){
    let u=document.getElementById('ex-unit').value, b;
    if(u==='minutes') b=(parseFloat(document.getElementById('ex-best-min').value)||0)+(parseFloat(document.getElementById('ex-best-sec').value)||0)/60;
    else b=parseFloat(document.getElementById('ex-best').value);
    if(!document.getElementById('ex-name').value||isNaN(b)) return;
    if(editId){
        let i=state.exercises.findIndex(e=>e.id===editId);
        state.exercises[i]={...state.exercises[i], name:document.getElementById('ex-name').value, unit:u, best:b, direction:document.getElementById('ex-direction').value, body:document.getElementById('ex-body').value, type:document.getElementById('ex-type').value};
        editId=null; document.getElementById('btn-submit-ex').textContent="Add to Arsenal";
    } else state.exercises.push({id:Date.now(), name:document.getElementById('ex-name').value, unit:u, best:b, body:document.getElementById('ex-body').value, type:document.getElementById('ex-type').value, direction:document.getElementById('ex-direction').value, pb:null});
    save(); location.reload();
}
function renderExercises(){
    document.getElementById('exercise-list').innerHTML=state.exercises.map(ex=>`
    <div class="exercise-card">
        <div class="exercise-info"><h3>${ex.name}</h3><span class="unit">Best: ${formatVal(ex.pb||0,ex.unit)}</span><br><span class="history-link" onclick="showHistory(${ex.id})">Chronology</span></div>
        <div class="exercise-actions">
            <button class="btn btn-small" onclick="editEx(${ex.id})">Edit</button>
            <button class="btn btn-danger btn-small" onclick="delEx(${ex.id})">Del</button>
        </div>
    </div>`).join('');
}
function editEx(id){
    editId=id; let ex=state.exercises.find(e=>e.id===id);
    document.getElementById('ex-name').value=ex.name; document.getElementById('ex-unit').value=ex.unit; updateExInputUI();
    document.getElementById('btn-submit-ex').textContent="Update Protocol"; window.scrollTo(0,0);
}
function delEx(id){ if(confirm("Purge exercise and logs?")){state.exercises=state.exercises.filter(e=>e.id!==id); state.logs=state.logs.filter(l=>l.exId!==id); save(); renderExercises();} }

// --- LOGGING ---
let aProto=null, pIdx=0;
function updateLogInputUI(){
    let ex=state.exercises.find(e=>e.id==document.getElementById('log-exercise').value), isT=ex&&ex.unit==='minutes';
    document.getElementById('log-amount-standard-wrap').style.display=isT?'none':'block';
    document.getElementById('log-amount-time-wrap').style.display=isT?'flex':'none';
    let w=document.getElementById('shadow-display');
    if(ex&&ex.pb!==null){w.classList.add('active'); document.getElementById('shadow-val').textContent=formatVal(ex.pb,ex.unit);} else w.classList.remove('active');
}
function submitLog(){
    let ex=state.exercises.find(e=>e.id==document.getElementById('log-exercise').value), v;
    if(ex.unit==='minutes') v=(parseFloat(document.getElementById('log-amount-min').value)||0)+(parseFloat(document.getElementById('log-amount-sec').value)||0)/60;
    else v=parseFloat(document.getElementById('log-amount').value);
    if(!ex||isNaN(v)) return;
    let ts = new Date(document.getElementById('log-date').value).getTime() || Date.now();
    let isPB=ex.pb===null||(ex.direction==='lower'?v<ex.pb:v>ex.pb);
    if(isPB){ex.pb=v; playSound('powerUp');} else playSound('success');
    let bDef=false;
    if(state.boss&&state.boss.exId==ex.id && (ex.direction==='higher'?v>=state.boss.target:v<=state.boss.target)){bDef=true; state.boss=null;}
    let xp=addXP(50,ex); if(isPB)xp+=addXP(100,ex); if(bDef)xp+=addXP(500,ex);
    state.logs.push({id:Date.now(), exId:ex.id, val:v, ts}); save();
    showModal(ex,v,xp,isPB,bDef); renderHistory();
    if(aProto){ pIdx++; if(pIdx>=aProto.exercises.length){aProto=null; document.getElementById('proto-notice').style.display='none';} else loadProtoEx();}
}
function showModal(ex,v,xp,isPB,bDef){
    let p=getPct(ex,v), r=getRank(p);
    document.getElementById('modal-rank').textContent=r; document.getElementById('modal-rank').className=`rank-badge rank-${r}`;
    document.getElementById('modal-pct').textContent=`${p}% Ascension`;
    document.getElementById('modal-pb-msg').textContent=isPB?'👑 NEW PERSONAL BEST':'';
    if(bDef) document.getElementById('modal-pb-msg').textContent+=' | 👹 BOSS DEFEATED';
    document.getElementById('modal-xp').textContent=`+${xp} XP`;
    document.getElementById('result-modal').classList.add('open'); checkAchs();
}

// --- HISTORY & DELETE ---
function renderHistory(){
    const sorted=[...state.logs].sort((a,b)=>b.ts-a.ts).slice(0, 20);
    document.getElementById('log-history').innerHTML=sorted.map(l=>{
        const ex=state.exercises.find(e=>e.id==l.exId); if(!ex)return'';
        return `<div class="log-entry">
            <div style="font-size:10px; color:var(--muted)">${new Date(l.ts).toLocaleDateString()}</div>
            <div class="log-name">${ex.name}</div>
            <div style="text-align:right"><strong>${formatVal(l.val,ex.unit)}</strong></div>
            <button class="btn btn-danger btn-small" style="width:30px" onclick="deleteLog(${l.id})">✖</button>
        </div>`;
    }).join('');
}
function deleteLog(id){
    if(confirm("Delete this memory?")){
        state.logs=state.logs.filter(l=>l.id!==id);
        state.exercises.forEach(ex=>{
            let eL=state.logs.filter(l=>l.exId===ex.id);
            if(!eL.length)ex.pb=null; else ex.pb=ex.direction==='lower'?Math.min(...eL.map(l=>l.val)):Math.max(...eL.map(l=>l.val));
        });
        save(); renderHistory(); renderCharacter();
    }
}

// --- FEATS ---
const FEATS=[
    {id:'f1', icon:'⚔️', name:'First Step', desc:'Log 1 session.', check:s=>s.logs.length>=1},
    {id:'f2', icon:'🔥', name:'Dedicated', desc:'Log 10 sessions.', check:s=>s.logs.length>=10},
    {id:'f3', icon:'👑', name:'Sovereign', desc:'Achieve S Rank.', check:s=>s.logs.some(l=>{let e=s.exercises.find(x=>x.id==l.exId); return e&&getPct(e,l.val)>=70})},
    {id:'boss_slayer', icon:'👹', name:'Slayer', desc:'Defeat a Boss.', check:s=>s.unlockedAchs['boss_slayer']}
];
function checkAchs(){ FEATS.forEach(f=>{if(!state.unlockedAchs[f.id]&&f.check(state)){state.unlockedAchs[f.id]=Date.now(); showToast({icon:f.icon,name:f.name});}}); save();}
function resetAch(id){ if(confirm("Reset feat?")){delete state.unlockedAchs[id]; save(); renderAchievements();}}
function renderAchievements(){
    document.getElementById('achievements-grid').innerHTML=FEATS.map(f=>`<div class="achievement ${state.unlockedAchs[f.id]?'unlocked':'locked'}" onclick="if(state.unlockedAchs['${f.id}'])resetAch('${f.id}')"><div class="ach-icon">${f.icon}</div><div><div class="ach-name">${f.name}</div><div class="ach-desc">${f.desc}</div></div></div>`).join('');
}

// --- PROTOCOLS ---
function createProtocol(){
    let n=document.getElementById('proto-name').value, checks=document.querySelectorAll('.proto-check:checked'), ids=Array.from(checks).map(c=>parseInt(c.value));
    if(!n||!ids.length)return; state.protocols.push({id:Date.now(), name:n, exercises:ids}); save(); renderProtocols();
}
function renderProtocols(){
    document.getElementById('protocol-list').innerHTML=state.protocols.map(p=>`<div class="protocol-card" onclick="startProto(${p.id})"><div>${p.name}</div><div style="font-size:9px; color:var(--muted)">${p.exercises.length} Exercises</div></div>`).join('');
    document.getElementById('proto-selector').innerHTML=state.exercises.map(e=>`<div><input type="checkbox" class="proto-check" value="${e.id}"> ${e.name}</div>`).join('');
}
function startProto(id){ aProto=state.protocols.find(p=>p.id===id); pIdx=0; switchTab('log',document.querySelectorAll('.tab')[2]); loadProtoEx();}
function loadProtoEx(){
    let id=aProto.exercises[pIdx]; document.getElementById('log-exercise').value=id;
    document.getElementById('proto-notice').style.display='block'; document.getElementById('proto-notice').textContent=`// PROTOCOL: ${aProto.name} (${pIdx+1}/${aProto.exercises.length}) //`;
    updateLogInputUI();
}

// --- SYSTEM ---
let tI;
function startTimer(){ let l=90; clearInterval(tI); tI=setInterval(()=>{l--; document.getElementById('timer-clock').textContent=`0${Math.floor(l/60)}:${(l%60).toString().padStart(2,'0')}`; if(l<=0){clearInterval(tI);playSound('powerUp');}},1000);}
function switchTab(n,e){
    playSound('click'); document.querySelectorAll('.view').forEach(v=>v.classList.remove('active')); document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.getElementById('view-'+n).classList.add('active'); e.classList.add('active');
    if(n==='character'){renderCharacter(); renderRadar();} if(n==='achievements')renderAchievements(); if(n==='protocols')renderProtocols(); if(n==='log')renderLogView();
}
function renderLogView(){ 
    document.getElementById('log-exercise').innerHTML='<option value="">-Select-</option>'+state.exercises.map(e=>`<option value="${e.id}">${e.name}</option>`).join(''); 
    renderHistory();
}
function renderCharacter(){
    let exR=state.exercises.map(ex=>{let p=ex.pb?getPct(ex,ex.pb):0; return{ex,p,rank:getRank(p)}});
    document.getElementById('char-stats').innerHTML=exR.map(r=>`<div class="log-entry"><div class="rank-badge rank-${r.rank}" style="width:30px;height:30px;font-size:10px">${r.rank}</div><div>${r.ex.name}</div><div style="text-align:right">${formatVal(r.ex.pb,r.ex.unit)}</div></div>`).join('');
    let upperR=exR.filter(r=>r.ex.body==='upper'), allR=exR.length?exR.map(r=>rankToNum(r.rank)).reduce((a,b)=>a+b,0)/exR.length:0;
    document.getElementById('stat-golf').textContent=numToRank(allR);
    document.getElementById('stat-javelin').textContent=numToRank(upperR.length?upperR.map(r=>rankToNum(r.rank)).reduce((a,b)=>a+b,0)/upperR.length:0);
}
function closeModal(){ document.getElementById('result-modal').classList.remove('open'); clearInterval(tI); }
function showToast(a){ let e=document.createElement('div'); e.className='toast show'; e.innerHTML=`<span>${a.icon}</span><div>${a.name}</div>`; document.getElementById('toast-wrap').appendChild(e); setTimeout(()=>e.remove(),3000);}
function exportData(){ let b=new Blob([JSON.stringify(state)],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='sovereign.json'; a.click();}
function importData(e) {
  const r = new FileReader(); r.onload = (ev) => { state = JSON.parse(ev.target.result); save(); location.reload(); }; r.readAsText(e.target.files[0]);
}

// INIT
document.getElementById('log-date').value=new Date().toISOString().split('T')[0];
renderHeader(); renderExercises(); manageBoss();
</script>
</body>
</html>
